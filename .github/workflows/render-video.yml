name: Render Geo Base Video

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: geobase-${{ github.workflow }}-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  validate-and-render:
    name: Validate and render
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate data and source code
        run: npm run check

      - name: Install Japanese fonts
        if: github.event_name != 'pull_request'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f

      - name: Install Remotion browser
        if: github.event_name != 'pull_request'
        run: npx remotion browser ensure

      - name: Render video
        if: github.event_name != 'pull_request'
        run: npm run render -- --concurrency=2

      - name: Verify output
        if: github.event_name != 'pull_request'
        run: |
          compgen -G "out/GeoBase_*.mp4" > /dev/null
          test -s "$(find out -maxdepth 1 -name 'GeoBase_*.mp4' -print -quit)"

      - name: Upload rendered video
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: GeoBase-video-${{ github.run_number }}
          path: out/GeoBase_*.mp4
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Add download instructions
        if: github.event_name != 'pull_request'
        run: |
          VIDEO_NAME="$(basename "$(find out -maxdepth 1 -name 'GeoBase_*.mp4' -print -quit)")"
          echo "## Geo Base video generated" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Triggered automatically by an update to **main**." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Triggered manually from Actions." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Download **GeoBase-video-${{ github.run_number }}** from Artifacts." >> "$GITHUB_STEP_SUMMARY"
          echo "MP4 file: **${VIDEO_NAME}**" >> "$GITHUB_STEP_SUMMARY"
